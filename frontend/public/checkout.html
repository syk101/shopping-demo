<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Premium Fashion</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/shop.css">
    <style>
        .checkout-page { padding: 8rem 0; background: #f8fafc; min-height: 100vh; }
        .checkout-grid { display: grid; grid-template-columns: 1fr 400px; gap: 3rem; }
        .checkout-card { background: white; padding: 2.5rem; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .checkout-card h2 { margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .summary-item { display: flex; justify-content: space-between; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid #e2e8f0; }
        .summary-total { font-size: 1.5rem; font-weight: 800; color: #1e293b; margin-top: 1rem; }
        .payment-methods { margin-top: 2rem; display: grid; gap: 1rem; }
        .payment-option { border: 2px solid #e2e8f0; padding: 1.5rem; border-radius: 0.75rem; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 1rem; }
        .payment-option.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
        .payment-option i { font-size: 1.5rem; }
        @media (max-width: 968px) { .checkout-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <nav class="main-nav">
        <div class="nav-container">
            <a href="shop.html" class="logo"><i class="fas fa-store"></i><span>Weary</span></a>
            <a href="shop.html" class="btn btn-outline btn-small"><i class="fas fa-arrow-left"></i> BACK TO SHOP</a>
        </div>
    </nav>

    <div class="checkout-page">
        <div class="container">
            <div class="checkout-grid">
                <div class="checkout-main">
                    <div class="checkout-card">
                        <h2><i class="fas fa-shipping-fast"></i> Shipping Information</h2>
                        <form id="checkout-form">
                            <div class="form-group"><input type="text" id="full-name" placeholder="Full Name" required></div>
                            <div class="form-row">
                                <div class="form-group"><input type="email" id="email" placeholder="Email Address" required></div>
                                <div class="form-group"><input type="tel" id="phone" placeholder="Phone Number" required></div>
                            </div>
                            <div class="form-group"><textarea id="address" placeholder="Full Delivery Address" rows="3" required></textarea></div>
                            
                            <h2 style="margin-top: 3rem;"><i class="fas fa-credit-card"></i> Payment Method</h2>
                            <div class="payment-methods">
                                <div class="payment-option active" onclick="selectPayment('bkash')">
                                    <i class="fas fa-mobile-alt"></i>
                                    <div><strong>bKash Payment</strong><p>Pay securely via bKash mobile wallet</p></div>
                                </div>
                                <div class="payment-option" onclick="selectPayment('card')">
                                    <i class="fas fa-credit-card"></i>
                                    <div><strong>Credit / Debit Card</strong><p>Visa, Mastercard, American Express</p></div>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="checkout-sidebar">
                    <div class="checkout-card">
                        <h2>Order Summary</h2>
                        <div id="summary-items">
                            <!-- Items loaded from cart -->
                        </div>
                        <div class="summary-total summary-item" style="border:none;">
                            <span>Total</span>
                            <span id="summary-total">$0.00</span>
                        </div>
                        <button class="btn btn-primary" style="width: 100%; margin-top: 2rem;" onclick="processCheckout()">
                            COMPLETE PURCHASE
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedMethod = 'bkash';
        function selectPayment(method) {
            selectedMethod = method;
            document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        async function loadSummary() {
            const res = await fetch('/api/cart');
            const cart = await res.json();
            const container = document.getElementById('summary-items');
            let total = 0;
            
            container.innerHTML = cart.map(item => {
                total += item.price * item.quantity;
                return `<div class="summary-item">
                    <span>${item.name} x ${item.quantity}</span>
                    <span>$${(item.price * item.quantity).toFixed(2)}</span>
                </div>`;
            }).join('');
            
            document.getElementById('summary-total').textContent = `$${(total + 10).toFixed(2)}`;
        }

        async function processCheckout() {
            const name = document.getElementById('full-name').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;
            const totalStr = document.getElementById('summary-total').textContent.replace('$', '');
            
            if(!name || !phone || !address) {
                alert('Please fill all shipping details');
                return;
            }

            const res = await fetch('/api/checkout', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    customer_name: name,
                    phone: phone,
                    address: address,
                    total_price: parseFloat(totalStr)
                })
            });
            const data = await res.json();
            
            if(data.success) {
                // Mock payment step
                window.location.href = `payment.html?order_id=${data.order_id}&amount=${totalStr}&method=${selectedMethod}`;
            }
        }

        loadSummary();
    </script>
</body>
</html>
