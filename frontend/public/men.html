<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Men's Collection | Premium Shop</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/shop.css">
    <link rel="stylesheet" href="styles/products.css">
    <!-- AI Search Support -->
    <script type="module">
        import { pipeline, env, AutoProcessor, CLIPVisionModelWithProjection } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        env.allowLocalModels = false;
        window.AI_PIPELINE = pipeline;
        window.AI_PROCESSOR = AutoProcessor;
        window.AI_VISION_MODEL = CLIPVisionModelWithProjection;
        window.aiReady = true;
        console.log("AI Search Engine loaded.");
    </script>
    <style>
        .category-section {
            margin-bottom: 4rem;
        }

        .section-title-modern {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
            color: #1a1a1a;
        }

        .section-header-wrap {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 2rem;
        }

        /* Filter Bar Styles */
        .filter-bar-modern {
            background: #fff;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .search-box-modern {
            position: relative;
            flex: 1;
            min-width: 250px;
        }

        .search-box-modern input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border: 1px solid #eee;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .search-box-modern input:focus {
            outline: none;
            border-color: #1a1a1a;
            box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.02);
        }

        .search-box-modern i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .sort-box-modern {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sort-box-modern select {
            padding: 12px 15px;
            border: 1px solid #eee;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            background: #fff;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <nav class="main-nav">
        <div class="nav-container">
            <a href="shop.html" class="logo">
                <i class="fas fa-store"></i>
                <span>Weary</span>
            </a>
            <div class="nav-links">
                <a href="shop.html" class="nav-link">Home</a>
                <a href="men.html" class="nav-link active">Men</a>
                <a href="women.html" class="nav-link">Women</a>
                <a href="kids.html" class="nav-link">Kids</a>
                <button id="camera-search-btn" class="camera-btn" title="Search by Image">
                    <i class="fas fa-camera"></i>
                </button>
                <div class="cart-nav" id="cart-toggle">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count" class="cart-badge">0</span>
                </div>
            </div>
            <div class="mobile-menu-btn">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <section class="products-header">
        <div class="container container-header">
            <div class="breadcrumb">
                <a href="shop.html">Home</a> <i class="fas fa-chevron-right"
                    style="font-size: 0.6rem; margin: 0 8px; color: #ccc;"></i> <span>Men</span>
            </div>
            <h1>Men's Collection</h1>
            <p>Elevated styles for the modern gentleman</p>
        </div>
    </section>

    <main class="container" style="margin-top: 3rem;">
        <!-- Filter Bar -->
        <div class="filter-bar-modern">
            <div class="search-box-modern">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Search for products...">
            </div>
            <div class="sort-box-modern">
                <span style="font-weight: 500; font-size: 0.9rem;">Sort by:</span>
                <select id="sort-select">
                    <option value="default">Default</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                </select>
            </div>
        </div>

        <!-- Premium Section -->
        <div class="category-section" id="premium-section">
            <div class="section-header-wrap">
                <h2 class="section-title-modern">Premium Wear</h2>
            </div>
            <div class="products-grid-modern" id="premium-grid">
                <!-- Products will be injected here -->
            </div>
        </div>

        <!-- Casual Section -->
        <div class="category-section" id="casual-section">
            <div class="section-header-wrap">
                <h2 class="section-title-modern">Casual Wear</h2>
            </div>
            <div class="products-grid-modern" id="casual-grid">
                <!-- Products will be injected here -->
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Weary Premium Shop. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Cart Sidebar -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>Your Shopping Cart</h3>
            <button id="close-cart"><i class="fas fa-times"></i></button>
        </div>
        <div class="cart-items-list" id="cart-items-list"></div>
        <div class="cart-footer">
            <div class="cart-summary">
                <div class="summary-line"><span>Subtotal</span> <span id="cart-subtotal">$0.00</span></div>
                <div class="summary-line"><span>Delivery</span> <span id="cart-delivery">$10.00</span></div>
                <div class="summary-line total"><span>Grand Total</span> <span id="cart-total">$0.00</span></div>
            </div>
            <button class="btn btn-primary checkout-btn" id="checkout-btn">PROCEED TO CHECKOUT</button>
        </div>
    </div>

    <!-- AI Try-On Modal -->
    <div class="modal-overlay" id="tryon-modal">
        <div class="modal-content tryon-content">
            <div class="modal-header"><h3>AI Virtual Try-On</h3><button id="close-tryon"><i class="fas fa-times"></i></button></div>
            <div class="tryon-body">
                <div class="upload-section">
                    <input type="file" id="avatar-upload" accept="image/*" hidden>
                    <label for="avatar-upload" class="upload-label"><i class="fas fa-cloud-upload-alt"></i><span>Select Profile Photo</span></label>
                </div>
                <div id="tryon-preview" class="tryon-preview"></div>
                <button id="start-tryon" class="btn btn-secondary">GENERATE AI PREVIEW</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/camera-search.js"></script>
    <script src="js/cart-system.js"></script>
    <script src="js/tryon-system.js"></script>
    <script src="js/category.js"></script>
</body>

</html>
